<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 3</title>

    <style>
        .paginacao {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            font-family: Arial, sans-serif;
        }

        .paginacao button {
            background: white;
            border: 1px solid #dfe1e5;
            color: #1a0dab;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }

        .paginacao button:hover {
            background-color: #f8f9fa;
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.1);
        }

        .paginacao button.ativo {
            color: black;
            border: none;
            font-weight: bold;
            cursor: default;
        }
    </style>
</head>
<body>
    <h1>Aula 3</h1>
    <p>Atividade da aula 3</p>

        <button><a href="div.html">Caixas</a><br></button>
        <button><a href="../index.html">Voltar para o index</a></button>
    </div>
</body>
</html>
